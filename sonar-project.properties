sonar.projectKey=mario-platformer
sonar.projectName=Mario Platformer
sonar.projectVersion=1.0

sonar.sources=app,components,engine,entities,hooks,levels,store,utils
sonar.exclusions=**/node_modules/**,.next/**,coverage/**,dist/**,build/**,docs/legacy/**

sonar.tests=.
sonar.test.inclusions=**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx

sonar.sourceEncoding=UTF-8
sonar.typescript.tsconfigPath=tsconfig.json
